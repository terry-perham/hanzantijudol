name: False Positive Report
description: Report a domain that should be removed or reviewed from anti-judol blocklist
title: "[False Positive] <domain>"
labels:
  - false-positive
  - domain-review
body:
  - type: input
    id: domain
    attributes:
      label: Domain
      description: Domain that you believe is incorrectly classified
      placeholder: example.com
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why this is false positive
      description: Explain why this domain should not be blocked
      placeholder: Domain is educational/news/government and does not contain gambling content
    validations:
      required: true

  - type: input
    id: evidence_url
    attributes:
      label: Supporting URL or evidence
      description: Optional proof link
      placeholder: https://...

  - type: checkboxes
    id: agreement
    attributes:
      label: Agreement
      options:
        - label: I understand this report will be reviewed under SLA and may require additional evidence.
          required: true
