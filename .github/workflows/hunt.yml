name: Hunt Domains

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

concurrency:
  group: hunt-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hunt:
    if: ${{ github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: write
      actions: read
      checks: write
      statuses: write
    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          python -m playwright install chromium

      - name: Run hunter
        run: |
          set -euo pipefail
          python scripts/hunter.py --method all

      - name: Validate hunting outputs
        run: |
          set -euo pipefail
          test -s data/candidates_a.json
          test -s data/candidates_b.json
          test -s data/candidates_c.json
          test -s data/candidates_d.json
          test -s data/candidates_e.json
          test -s data/candidates_f.json
          test -s data/candidates_merged.json

      - name: Upload hunting artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hunting-results-${{ github.run_id }}
          path: |
            data/candidates_a.json
            data/candidates_b.json
            data/candidates_c.json
            data/candidates_d.json
            data/candidates_e.json
            data/candidates_f.json
            data/candidates_merged.json
          retention-days: 7
          if-no-files-found: error

      - name: Commit generated candidates
        if: ${{ github.ref_name == 'main' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/candidates_a.json data/candidates_b.json data/candidates_c.json data/candidates_d.json data/candidates_e.json data/candidates_f.json data/candidates_merged.json
          if git diff --staged --quiet; then
            echo "No candidate changes to commit"
            exit 0
          fi
          git commit -m "ci(hunt): update candidates [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
