name: Notify Updates

on:
  workflow_run:
    workflows: ["Generate Blocklist"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: notify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notify:
    if: ${{ (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Validate blocklist input
        run: |
          set -euo pipefail
          test -s data/blocklist.json
          test -s data/pipeline_health.json

      - name: Run notifier
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NOTIFY_STRICT: "true"
        run: |
          set -euo pipefail
          python scripts/notify.py --blocklist data/blocklist.json --pipeline-health data/pipeline_health.json
